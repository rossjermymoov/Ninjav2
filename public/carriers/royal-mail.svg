<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Royal Mail red background -->
  <rect width="64" height="64" rx="10" fill="#E30613"/>
  <!-- Crown shape -->
  <g fill="#FFFFFF">
    <!-- Crown base band -->
    <rect x="12" y="38" width="40" height="8" rx="2"/>
    <!-- Three crown points -->
    <polygon points="14,38 14,24 20,30 26,20 32,28 38,20 44,30 50,24 50,38"/>
    <!-- Crown jewels (circles on points) -->
    <circle cx="26" cy="20" r="3"/>
    <circle cx="32" cy="17" r="3"/>
    <circle cx="38" cy="20" r="3"/>
  </g>
</svg>
